[defaults]
inventory = ./hosts
host_key_checking = False
remote_user = admin
ask_pass = False
ask_become_pass = False
private_key_file = /dev/null
ssh_args = -o PubkeyAuthentication=no -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[privilege_escalation]
become = True
become_method = sudo
become_user = root
